name: Trade Risk API - CI/CD Pipeline

on:
  push:
    branches: 
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches: 
      - main
      - develop

env:
  DOTNET_VERSION: '8.0.x'
  BUILD_CONFIGURATION: 'Release'

jobs:
  # ===========================================================================
  # JOB 1: Build and Test
  # ===========================================================================
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: 📦 Restore dependencies
      run: dotnet restore
    
    - name: 🔨 Build solution
      run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore
    
    - name: 🧪 Run unit tests
      run: dotnet test tests/TradeRiskApi.UnitTests/ --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --logger "trx;LogFileName=unit-test-results.trx"
    
    - name: 🌐 Run integration tests
      run: dotnet test tests/TradeRiskApi.IntegrationTests/ --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --logger "trx;LogFileName=integration-test-results.trx"
    
    - name: 📊 Publish test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results
        path: '**/*.trx'
        reporter: dotnet-trx
    
    - name: 📦 Publish application
      run: dotnet publish src/TradeRiskApi.Web/TradeRiskApi.Web.csproj -c ${{ env.BUILD_CONFIGURATION }} -o ./publish --no-build
    
    - name: 📤 Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: trade-risk-api-${{ github.sha }}
        path: ./publish
        retention-days: 7

  # ===========================================================================
  # JOB 2: Code Quality Analysis
  # ===========================================================================
  code-quality:
    name: 📊 Code Quality
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: 📊 Generate coverage report
      run: |
        dotnet test /p:CollectCoverage=true \
                     /p:CoverletOutputFormat=opencover \
                     /p:CoverletOutput=./TestResults/coverage.xml \
                     --configuration ${{ env.BUILD_CONFIGURATION }}
    
    - name: 📈 Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./TestResults/coverage.xml
        flags: unittests
        name: codecov-umbrella

  # ===========================================================================
  # JOB 3: Docker Build
  # ===========================================================================
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🔧 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: 🔐 Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: 🏷️ Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ secrets.DOCKER_USERNAME }}/trade-risk-api
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=semver,pattern={{version}}
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: 🏗️ Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ===========================================================================
  # JOB 4: Deploy to Staging
  # ===========================================================================
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.trade-risk-api.com
    
    steps:
    - name: 📥 Download artifact
      uses: actions/download-artifact@v4
      with:
        name: trade-risk-api-${{ github.sha }}
        path: ./publish
    
    - name: 🚀 Deploy to Azure App Service (Staging)
      uses: azure/webapps-deploy@v2
      with:
        app-name: trade-risk-api-staging
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_STAGING }}
        package: ./publish
    
    - name: 🧪 Smoke test
      run: |
        sleep 30
        curl -f https://staging.trade-risk-api.com/health || exit 1

  # ===========================================================================
  # JOB 5: Deploy to Production
  # ===========================================================================
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://trade-risk-api.com
    
    steps:
    - name: 📥 Download artifact
      uses: actions/download-artifact@v4
      with:
        name: trade-risk-api-${{ github.sha }}
        path: ./publish
    
    - name: 🚀 Deploy to Azure App Service (Production)
      uses: azure/webapps-deploy@v2
      with:
        app-name: trade-risk-api-production
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PRODUCTION }}
        package: ./publish
    
    - name: 🧪 Smoke test
      run: |
        sleep 30
        curl -f https://trade-risk-api.com/health || exit 1
    
    - name: 📢 Notify deployment success
      uses: 8398a7/action-slack@v3
      if: success()
      with:
        status: custom
        custom_payload: |
          {
            text: "✅ Trade Risk API deployed to production successfully!",
            attachments: [{
              color: 'good',
              text: `Branch: ${process.env.GITHUB_REF}\nCommit: ${process.env.GITHUB_SHA}\nActor: ${process.env.GITHUB_ACTOR}`
            }]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # ===========================================================================
  # JOB 6: Security Scan
  # ===========================================================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🔍 Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: 📤 Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'